version: '3.8'

# =====================================================
# Gentong Mas ERP — Docker Compose untuk CasaOS
# =====================================================
# Sebelum jalankan:
# 1. Salin .env.example → .env lalu isi SERVER_IP dan JWT secrets
# 2. docker compose up -d --build
# =====================================================

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-erp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-erp_password}
      POSTGRES_DB: ${POSTGRES_DB:-gentong_mas_erp}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-erp} -d ${POSTGRES_DB:-gentong_mas_erp}']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    ports:
      - '6000:6000'
    environment:
      NODE_ENV: production
      PORT: 6000
      DATABASE_URL: postgresql://${POSTGRES_USER:-erp}:${POSTGRES_PASSWORD:-erp_password}@postgres:5432/${POSTGRES_DB:-gentong_mas_erp}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-use-openssl-rand}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh-use-openssl-rand}
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_EXPIRES_IN: 30d
      # Tambah IP/domain jika ada yang perlu diizinkan khusus
      CORS_ORIGINS: ${CORS_ORIGINS:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:6000/api/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        APP_DIR: web
        PORT: 5000
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: production
      PORT: 5000
      # Untuk akses dari browser di jaringan lokal, set ke IP CasaOS server
      BACKEND_URL: http://backend:6000
      NEXT_PUBLIC_API_URL: http://${SERVER_IP:-localhost}:6000
      NEXT_PUBLIC_APP_NAME: Gentong Mas ERP — Admin
    depends_on:
      backend:
        condition: service_healthy

  sales-app:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        APP_DIR: sales-app
        PORT: 3002
    restart: unless-stopped
    ports:
      - '3002:3002'
    environment:
      NODE_ENV: production
      PORT: 3002
      BACKEND_URL: http://backend:6000
      NEXT_PUBLIC_API_URL: http://${SERVER_IP:-localhost}:6000
      NEXT_PUBLIC_APP_NAME: Gentong Mas — Sales App
    depends_on:
      backend:
        condition: service_healthy

  gudang-app:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        APP_DIR: gudang-app
        PORT: 3003
    restart: unless-stopped
    ports:
      - '3003:3003'
    environment:
      NODE_ENV: production
      PORT: 3003
      BACKEND_URL: http://backend:6000
      NEXT_PUBLIC_API_URL: http://${SERVER_IP:-localhost}:6000
      NEXT_PUBLIC_APP_NAME: Gentong Mas — Gudang App
    depends_on:
      backend:
        condition: service_healthy

  pos-app:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        APP_DIR: pos-app
        PORT: 3001
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: production
      PORT: 3001
      BACKEND_URL: http://backend:6000
      NEXT_PUBLIC_API_URL: http://${SERVER_IP:-localhost}:6000
      NEXT_PUBLIC_APP_NAME: Gentong Mas — POS Kasir
    depends_on:
      backend:
        condition: service_healthy

  driver-app:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        APP_DIR: driver-app
        PORT: 3000
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      BACKEND_URL: http://backend:6000
      NEXT_PUBLIC_API_URL: http://${SERVER_IP:-localhost}:6000
      NEXT_PUBLIC_APP_NAME: Gentong Mas — Driver App
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
