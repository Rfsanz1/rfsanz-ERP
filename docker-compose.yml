# =====================================================
# Gentong Mas ERP — Full Stack (Frontend + Backend + DB)
# =====================================================
# Sebelum jalankan:
#   cp .env.example .env
#   nano .env          ← isi SERVER_IP, JWT_SECRET, dll
#   docker compose up -d --build
# =====================================================

services:

  # ─── PostgreSQL Database ──────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: erp_db
      POSTGRES_USER: erp_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-erp_password_aman}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp_user -d erp_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── NestJS Backend ───────────────────────────────
  backend:
    build:
      context: apps/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '${BACKEND_PORT:-3000}:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://erp_user:${POSTGRES_PASSWORD:-erp_password_aman}@postgres:5432/erp_db
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@rfsanz.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-root}
      ADMIN_NAME: ${ADMIN_NAME:-Administrator}
      COMPANY_NAME: ${COMPANY_NAME:-Gentong Mas}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─── Next.js Frontend ─────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        APP_DIR: frontend
        PORT: 5000
        BACKEND_URL: http://backend:3000
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - '${FRONTEND_PORT:-5000}:5000'
    environment:
      NODE_ENV: production
      PORT: 5000
      BACKEND_URL: http://backend:3000
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@rfsanz.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-root}
      NEXT_PUBLIC_APP_NAME: "Gentong Mas ERP"

volumes:
  postgres_data:
