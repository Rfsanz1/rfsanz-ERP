# =====================================================
# Gentong Mas ERP — Frontend Only (Backend via ngrok)
# =====================================================
# Sebelum jalankan:
# 1. Salin .env.example → .env lalu isi BACKEND_URL
# 2. docker compose up -d --build
# =====================================================

services:

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        APP_DIR: frontend
        PORT: 5000
        BACKEND_URL: ${BACKEND_URL:-https://briskly-underpaid-shucking.ngrok-free.dev}
    restart: unless-stopped
    ports:
      - '${FRONTEND_PORT:-5000}:5000'
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 5000
      BACKEND_URL: ${BACKEND_URL:-https://briskly-underpaid-shucking.ngrok-free.dev}
      NEXT_PUBLIC_APP_NAME: "Gentong Mas ERP"
