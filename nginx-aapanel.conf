# =====================================================================
# Gentong Mas ERP — Nginx Config untuk AA Panel
# Dua domain terpisah:
#   Frontend : gentongmaselektronik.my.id      → port 5000
#   Backend  : api.gentongmaselektronik.my.id  → port 3000
#
# Cara pakai di AA Panel:
#   1. Buat 2 site di AA Panel → Website
#   2. Untuk site "gentongmaselektronik.my.id":
#      Setting → Config → tempel blok VHOST 1 di bawah
#   3. Untuk site "api.gentongmaselektronik.my.id":
#      Setting → Config → tempel blok VHOST 2 di bawah
# =====================================================================


# ─── VHOST 1: Frontend (gentongmaselektronik.my.id) ─────────────────
# Tempel SELURUH blok ini di config site "gentongmaselektronik.my.id"
server {
    listen 80;
    server_name gentongmaselektronik.my.id www.gentongmaselektronik.my.id;

    # Semua request ke Next.js (port 5000)
    # Next.js sudah otomatis proxy /api/* ke backend secara internal
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # WebSocket / Socket.io untuk notifikasi realtime
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }
}


# ─── VHOST 2: Backend API (api.gentongmaselektronik.my.id) ──────────
# Tempel SELURUH blok ini di config site "api.gentongmaselektronik.my.id"
server {
    listen 80;
    server_name api.gentongmaselektronik.my.id;

    # Semua request ke NestJS backend (port 3000)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        client_max_body_size 50M;
    }

    # WebSocket / Socket.io
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }
}
